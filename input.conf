
# #######################################################################################
# Key Bindings
# #######################################################################################

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    mouse_refocus = false

    touchpad {
        natural_scroll = no
	      disable_while_typing = true
    }
    numlock_by_default = true

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

$mainMod = SUPER

bind = $mainMod, C, killactive, # Close active window
bind = $mainMod, M, exit, # Close Hyprland WM
bind = $mainMod, V, togglefloating, # Toggle active window in Floating mode
bind = $mainMod, H, exec, hyprctl setprop active opaque toggle # Toggle window blur
bind = $mainMod, ESCAPE, exec,sleep 1 ; hyprctl dispatcher dpms off # Turn Off screen
bind = $mainMod, F, fullscreen, 1 # Toggle Fullscreen
bind = $mainMod, R, cyclenext # Cycle through all open windows
bind = $mainMod, period, layoutmsg, move -col # move back to the previous Column
bind = $mainMod, slash, layoutmsg, move +col # move to the next Column
bind = $mainMod, comma, layoutmsg, swapcol l # swap postion with the next Column
bind = $mainMod, semicolon, layoutmsg, colresize -0.2  # decrease the width of the window
bind = $mainMod, apostrophe, layoutmsg, colresize +0.2  # increase the width of the window
bind = $mainMod, K, layoutmsg, promote # If a window share space with another window horizontally then shift the active to new column
bind = $mainMod, T, togglegroup # Toggle Tabs/Stacking/group mode
bind = $mainMod, R, changegroupactive, f # Move to forward tab
bind = $mainMod, E, changegroupactive, b # Move to backward tab
bind = $mainMod, Q, moveoutofgroup, active
bind = $mainMod, w, focuscurrentorlast

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, TAB, workspace, previous

binds {
  # workspace_back_and_forth = true
  allow_workspace_cycles = true 
}

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse
bind = $mainMod, mouse_down, workspace, e+1 # Move to higher workspace with mouse scroll
bind = $mainMod, mouse_up, workspace, e-1 # Move to lower workspace with mouse scroll
bindm = $mainMod, mouse:272, movewindow # Move window with left mouse button
bindm = $mainMod, mouse:273, resizewindow # resize window with right mouse button


# Launch Apps
bind = $mainMod, SPACE, exec, rofi -show combi -modes combi -combi-modes "drun,run" -show-icons # Rofi
bind = $mainMod SHIFT, Q, exec, kitty # Kitty Terminal
bind = $mainMod SHIFT, W, exec, nemo # Nemo File Browser
bind = $mainMod SHIFT, F, exec, app.zen_browser.zen # Zen Browser
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" # Partial screenshot
bind = $mainMod SHIFT, X, exec, grim # fullscreen screenshot
bind = $mainMod SHIFT, B, exec, kitty --class clipse -e clipse # Clipboard
bind = $mainMod SHIFT, Z, exec, killall -SIGUSR1 waybar # Toggle Waybar(TastBar)
bind = $mainMod SHIFT, N, exec, killall -SIGUSR1 wvkbd-deskintl # TOggel OnScreen Keyboard
