
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = hyprpaper
exec-once = brightnessctl -n s 100%
exec-once = kitty --hold sh -c "fastfetch"
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dunst
exec-once = clipse -listen
exec-once = cbatticon -u 60 -l 80 -r 50
exec-once = waybar
exec-once = wvkbd-deskintl -L 230 --hidden
exec-once = nm-applet
# exec-once = hyprpm reload -n
# exec-once = hypridle
#exec = swayidle timeout 60 'hyprctl dispatcher dpms off'

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
source = ~/.config/hypr/windowrules.conf
#source = ~/.config/hypr/hyprexpo.conf
source = ~/.config/hypr/input.conf

# Some default env vars.
env = XCURSOR_SIZE,24

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = -1
    border_size = 0
    # no_border_on_floating = 0
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgba(00000000)
    col.inactive_border = rgba(00000000)

    layout = scrolling
    resize_on_border = false
    extend_border_grab_area = 0
    hover_icon_on_border = false
}

scrolling {
    focus_fit_method = 1
  }

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 3
    #multisample_edges = true
    blur {
            enabled = true
            size = 2
            passes = 1
            new_optimizations = true
			      ignore_opacity = false
            xray = 0
            noise = 0.0
            #contrast = 0.8916
            contrast = 0.8916
            brightness = 0.8172
			      # brightness = 1
            ignore_opacity = true
			      vibrancy = 0.1696
			      vibrancy_darkness = 0.0
			      special = false
            popups = true
            input_methods = true
        }
      shadow {
        enabled = true
        range = 15
        render_power = 4
        offset = 0 0
        scale = 1.0
        ignore_window = true
        color = rgba(1a1a1aee)
      }
}

animations {
    enabled = no

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    # workspace_swipe = on
    # workspace_swipe_numbered = false
	# workspace_swipe_create_new = false
	# workspace_swipe_distance = 30
	# workspace_swipe_forever = false
  gesture = 3, horizontal, workspace
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    # sensitivity = -0.5
}

binds {
  # workspace_back_and_forth = true
  allow_workspace_cycles = true 
}

misc {
        mouse_move_enables_dpms = true
        key_press_enables_dpms = true
        animate_manual_resizes = 1
        animate_mouse_windowdragging = 1
        disable_hyprland_logo = true
        disable_splash_rendering = true
        force_default_wallpaper = 0
}

group {
	groupbar {
		enabled = true
    font_family = "CaskaydiaCove Nerd Font Mono"
    font_size = 10
    height = 10
    indicator_height = 1
    render_titles = false
	}
}
